<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOIL</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#f2f6ff; padding:2rem; color:#111; }
    .container { background:#fff; max-width:500px; margin:0 auto; border-radius:16px; padding:20px; box-shadow:0 6px 18px rgba(0,0,0,.08); }
    h1 { margin:0 0 6px; }
    .muted { color:#6b7280; font-size:13px; margin:0 0 10px; }
    video, canvas, img { width:100%; max-width:360px; border-radius:8px; margin-top:10px; }
    button, input[type=file], select { margin-top:8px; padding:10px 14px; border:0; border-radius:8px; background:#2563eb; color:#fff; cursor:pointer; }
    input[type=file] { background:#eef2ff; color:#111; }
    select { background:#eef2ff; color:#111; }
    .row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
    #label, #time { margin-top:8px; font-weight:600; }
    #status { margin-top:12px; padding:10px; background:#f8fafc; border:1px solid #e5e7eb; border-radius:8px; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; color:#111; white-space:pre-wrap; }
    .ok { color:#065f46; font-weight:600; }
    .err { color:#b91c1c; font-weight:600; }
	.stage {
    display: grid;
    place-items: center;   /* centers both horizontally & vertically */
    min-height: 420px;     /* adjust to taste */
    }
    h1 { text-align: center; }
	p { text-align: center; }
	video, canvas, img {
    display: block;      /* makes margin auto work */
    margin: 10px auto;   /* centers horizontally */
    width: 100%;
    max-width: 360px;
    border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 SOIL</h1>
    <p class="muted"> Choose crop → capture or upload → predict.</p>

    <!-- Crop picker -->
    <div class="row">
      <label for="cropSelect" class="muted" style="align-self:center;">Crop:</label>
      <select id="cropSelect" title="Select crop">
        <!-- Use folder names that exist under /static/ -->
        <option value="grape">grape</option>
        <option value="tomato">tomato</option>
        <option value="apple">apple</option>
		<option value="corn">corn</option>
        <!-- Add more here to match /static/<crop>/ -->
      </select>
    </div>

    <!-- Camera + Controls -->
    <div class="stage">
		<video id="video" autoplay playsinline></video>
	</div>

    <div class="row">
      <button id="btnCapture">📷 Capture & Predict</button>
      <input id="fileInput" type="file" accept="image/*"/>
    </div>

    <!-- Canvas (hidden) + Preview -->
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="preview" style="display:none;" alt="preview"/>

    <!-- Prediction -->
    <div id="label">Prediction: <span id="labelText">—</span></div>
    <div id="time">Inference time: <span id="timeText">—</span></div>

    <!-- Bottom status message -->
    <div id="status">Status: initializing…</div>
  </div>

  <script>
    // ====== USER CONFIG ======
    // If your models are at /static/<crop>/model.json this will work.
    // If you use /static/<crop>/model/model.json the loader will auto-fallback.

    // Optional default labels if labels.json is missing in a crop folder:
    const DEFAULT_LABELS = ["Black Rot", "Esca", "Healthy", "Blight"];

    // ====== UI refs ======
    const cropSelect = document.getElementById('cropSelect');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const btnCapture = document.getElementById('btnCapture');
    const fileInput = document.getElementById('fileInput');
    const labelText = document.getElementById('labelText');
    const timeText = document.getElementById('timeText');
    const statusBox = document.getElementById('status');

    let model = null;
    let modelType = null; // "graph" | "layers"
    let labels = DEFAULT_LABELS;
    let inputH = 256, inputW = 256; // will be inferred if possible
    let currentCrop = null;
    let loadToken = 0; // for race protection

    function setStatus(msg, type) {
      statusBox.textContent = msg;
      statusBox.className = type || "";
      console.log("[STATUS]", msg);
    }

    async function setupCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video:true });
        video.srcObject = stream;
        setStatus("Camera: ready.", "ok");
      } catch (err) {
        setStatus("Camera not available (you can still Upload). " + err.message, "err");
      }
    }

    function inferInputSizeFromModel(m) {
      try {
        const shape = m.inputs?.[0]?.shape || m.input?.shape || null;
        if (shape && shape.length >= 3) {
          const H = shape[1] ?? inputH;
          const W = shape[2] ?? inputW;
          if (Number.isFinite(H) && Number.isFinite(W)) {
            inputH = H; inputW = W;
          }
        }
      } catch {}
    }

    function preprocess(imgEl) {
      return tf.tidy(() => {
        let t = tf.browser.fromPixels(imgEl).toFloat();
        t = tf.image.resizeBilinear(t, [inputH, inputW]);
        t = t.div(255.0);
        return t.expandDims(0); // [1,H,W,3]
      });
    }

    async function predict(imgEl) {
      if (!model) { setStatus("No model loaded. Select a crop.", "err"); return; }
      const x = preprocess(imgEl);
      const t0 = performance.now();
      let y;
      try {
        y = model.predict(x);
        const data = await y.data(); // force compute
        const dt = performance.now() - t0;

        // Top-1
        let best = 0;
        for (let i = 1; i < data.length; i++) if (data[i] > data[best]) best = i;
        labelText.textContent = labels[best] ?? `Class ${best}`;
        timeText.textContent = `${dt.toFixed(2)} ms`;

        setStatus(`Prediction complete • crop=${currentCrop} • ${dt.toFixed(2)} ms • model=${modelType} • input=${inputW}×${inputH} • backend=${tf.getBackend()}`, "ok");
      } catch (err) {
        setStatus("Predict error: " + err.message, "err");
      } finally {
        tf.dispose([x, y]);
      }
    }

    btnCapture.addEventListener('click', () => {
      if (!video.videoWidth) { setStatus("Camera not ready", "err"); return; }
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      preview.src = canvas.toDataURL('image/png');
      preview.style.display = 'block';
      preview.onload = () => predict(preview);
    });

    fileInput.addEventListener('change', e => {
      const f = e.target.files?.[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      preview.src = url;
      preview.style.display = 'block';
      preview.onload = () => { URL.revokeObjectURL(url); predict(preview); };
    });

    async function fetchJSONSafe(url) {
      try {
        const res = await fetch(url, { cache: "no-cache" });
        if (!res.ok) throw new Error(res.status + " " + res.statusText);
        return await res.json();
      } catch {
        return null;
      }
    }

    async function unloadCurrentModel() {
      if (model && typeof model.dispose === "function") {
        try { model.dispose(); } catch {}
      }
      model = null;
      modelType = null;
    }

    async function loadModelForCrop(crop) {
      const myToken = ++loadToken; // capture token
      currentCrop = crop;
      labelText.textContent = "—";
      timeText.textContent = "—";

      // UI: disable while loading
      btnCapture.disabled = true;
      fileInput.disabled = true;
      cropSelect.disabled = true;

      setStatus(`Loading model for '${crop}'…`, "");

      // dispose previous model to free GPU memory
      await unloadCurrentModel();

      // Try two common layouts
      const candidates = [
        `static/${crop}/model.json`,
        `static/${crop}/model/model.json`
      ];

      // Load labels if present
      const lbls = await fetchJSONSafe(`static/${crop}/labels.json`);
      labels = Array.isArray(lbls) && lbls.length ? lbls : DEFAULT_LABELS;

      // Try GraphModel first; if both candidates fail, try LayersModel
      let loaded = false, lastErr = null;

      for (const url of candidates) {
        try {
          model = await tf.loadGraphModel(new URL(url, location.href).toString());
          modelType = "graph";
          loaded = true;
          break;
        } catch (err) {
          lastErr = err;
        }
      }
      if (!loaded) {
        for (const url of candidates) {
          try {
            model = await tf.loadLayersModel(new URL(url, location.href).toString());
            modelType = "layers";
            loaded = true;
            break;
          } catch (err) {
            lastErr = err;
          }
        }
      }

      if (myToken !== loadToken) {
        // A newer load started; abandon this one
        return;
      }

      if (!loaded) {
        setStatus(`Failed to load model for '${crop}'. Last error: ${lastErr?.message || "unknown"}`, "err");
        btnCapture.disabled = false; fileInput.disabled = false; cropSelect.disabled = false;
        return;
      }

      // Infer input size & warm up
      try {
        inferInputSizeFromModel(model);
        tf.tidy(() => {
          const warm = tf.zeros([1, inputH, inputW, 3]);
          const out = model.predict(warm);
          if (out && out.dataSync) out.dataSync();
        });
      } catch (e) {
        // Warmup failure isn't fatal
      }

      if (myToken !== loadToken) return;

      setStatus(
        `Loaded '${crop}' • model=${modelType} • input=${inputW}×${inputH} • labels=${labels.length} • backend=${tf.getBackend()}. Ready.`,
        "ok"
      );

      // Re-enable UI
      btnCapture.disabled = false;
      fileInput.disabled = false;
      cropSelect.disabled = false;
    }

    cropSelect.addEventListener('change', (e) => {
      const crop = e.target.value;
      loadModelForCrop(crop);
    });

    async function init() {
      if (location.protocol === 'file:') {
        setStatus("You opened via file:// (model fetch will be blocked). Please run a local server.", "err");
      }
      await setupCamera();
      // Auto-load the first crop in the list
      const firstCrop = cropSelect.value;
      await loadModelForCrop(firstCrop);
    }

    init();
  </script>
</body>
</html>
